<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub 黑马监测</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17211d;
        --muted: #65716c;
        --line: #d8dfd9;
        --panel: #ffffff;
        --bg: #f4f6f1;
        --accent: #16704a;
        --accent-soft: #dff2e7;
        --warm: #b7791f;
        --warm-soft: #fff3d8;
        --blue: #285cc4;
        --blue-soft: #e7eefc;
        --shadow: 0 18px 44px rgba(23,33,29,0.08);
      }
      * { box-sizing: border-box; margin:0; }
      body {
        min-height: 100vh;
        font-family: "Microsoft YaHei","PingFang SC",system-ui,sans-serif;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(22,112,74,0.12), transparent 360px),
          radial-gradient(circle at 85% 0%, rgba(183,121,31,0.12), transparent 260px),
          var(--bg);
        padding: 24px 16px 52px;
      }
      .shell { width: min(1240px, calc(100% - 32px)); margin:0 auto; }
      h1,h2,h3,p { margin:0; }
      .topbar { display: flex; justify-content: space-between; gap: 24px; align-items: end; margin-bottom: 22px; flex-wrap: wrap; }
      .topbar-actions { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; }
      .fetch-action { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
      .fetch-hint { color: var(--muted); font-size: 13px; white-space: nowrap; }
      .eyebrow { margin-bottom: 8px; color: var(--accent); font-size: 13px; font-weight: 800; letter-spacing: 0; text-transform: uppercase; }
      h1 { font-size: clamp(28px,5vw,48px); line-height: 1.02; }
      .topbar p { margin-top: 10px; color: var(--muted); line-height: 1.6; max-width: 680px; }
      .date-picker { display: grid; gap: 8px; min-width: 176px; color: var(--muted); font-size: 14px; }
      .date-select {
        font: inherit; min-width: 176px; border: 1px solid var(--line);
        border-radius: 8px; padding: 10px 12px; background: var(--panel); color: var(--ink);
      }
      .metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 18px; }
      .metrics > div {
        background: rgba(255,255,255,0.88); border: 1px solid var(--line);
        border-radius: 8px; box-shadow: var(--shadow); padding: 18px;
      }
      .metrics span { color: var(--muted); font-size: 13px; }
      .metrics strong { display: block; margin-top: 8px; font-size: 30px; line-height: 1; }
      .section {
        background: rgba(255,255,255,0.88); border: 1px solid var(--line);
        border-radius: 8px; box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px;
      }
      .section-head { display: flex; justify-content: space-between; gap: 18px; align-items: start; margin-bottom: 16px; flex-wrap: wrap; }
      .section-head h2 { font-size: 21px; }
      .section-head p { margin-top: 10px; color: var(--muted); line-height: 1.6; }
      .section-head span { color: var(--muted); font-size: 13px; }
      .rising-grid { display: grid; grid-template-columns: 1.25fr repeat(4,1fr); gap: 12px; }
      .rising-card {
        display: flex; min-height: 200px; flex-direction: column; gap: 12px;
        padding: 16px; border: 1px solid var(--line); border-radius: 8px;
        color: inherit; text-decoration: none; background: #fff;
      }
      .rising-card.primary { background: linear-gradient(180deg,#f8fff9,#fff); border-color: rgba(22,112,74,0.34); }
      .rising-card:hover, .rank-row:hover { border-color: rgba(22,112,74,0.46); box-shadow: 0 12px 28px rgba(22,112,74,0.10); }
      .rising-topline { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
      .rank-badge {
        display: inline-flex; align-items: center; justify-content: center;
        min-height: 30px; border-radius: 999px; padding: 5px 10px;
        font-size: 13px; font-weight: 800; background: var(--accent-soft); color: var(--accent);
      }
      .rising-topline strong { color: var(--warm); font-size: 21px; }
      .rising-card h3 { font-size: 17px; line-height: 1.35; overflow-wrap: anywhere; }
      .rising-card p, .use-case { color: #38443f; font-size: 14px; line-height: 1.65; }
      .repo-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
      .repo-meta span { padding: 4px 8px; border-radius: 999px; background: #eef2f0; color: #44514b; font-size: 12px; }
      .rank-table { display: grid; gap: 8px; }
      .rank-row {
        display: grid; grid-template-columns: 64px minmax(280px,1fr) 110px 116px 104px; gap: 14px;
        align-items: center; min-height: 110px; padding: 14px; border: 1px solid var(--line);
        border-radius: 8px; color: inherit; text-decoration: none; background: #fff;
      }
      .rank-num { display: grid; place-items: center; width: 48px; height: 48px; border-radius: 8px; background: var(--blue-soft); color: var(--blue); font-weight: 900; }
      .repo-title { font-weight: 900; overflow-wrap: anywhere; }
      .use-case { margin-top: 6px; }
      .tag-badges { display: inline-flex; flex-wrap: wrap; gap: 4px; margin-left: 6px; vertical-align: middle; }
      .tag-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; background: var(--accent-soft); color: var(--accent); white-space: nowrap; }
      .repo-desc { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.45; }
      .rank-stats { display: grid; gap: 4px; justify-items: end; }
      .rank-stats strong { font-size: 20px; }
      .rank-stats span { color: var(--muted); font-size: 12px; }
      .rank-change {
        display: inline-flex; align-items: center; justify-content: center;
        min-height: 30px; border-radius: 999px; padding: 5px 10px;
        font-size: 13px; font-weight: 800;
        background: var(--warm-soft); color: var(--warm); white-space: nowrap;
      }
      .status { text-align: center; padding: 48px 16px; color: var(--muted); }
      .status-btn {
        margin-top: 16px; padding: 12px 28px; border: 1px solid var(--accent);
        border-radius: 8px; background: var(--accent); color: #fff; font: inherit; cursor: pointer;
        font-size: 16px; font-weight: 700;
      }
      .status-btn:hover { opacity: 0.85; }
      .status-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      @media (max-width: 1100px) {
        .rising-grid { grid-template-columns: repeat(2,1fr); }
        .rank-row { grid-template-columns: 56px minmax(0,1fr) 96px; }
        .rank-stats:nth-of-type(2), .rank-change { display: none; }
      }
      @media (max-width: 720px) {
        .topbar { flex-direction: column; align-items: stretch; }
        .rising-grid { grid-template-columns: 1fr; }
        .rank-row { grid-template-columns: 1fr; }
        .rank-stats { justify-items: start; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Daily GitHub TrendRadar</p>
          <h1>GitHub 黑马监测</h1>
          <p id="subtitle">点击「抓取今日数据」开始</p>
          <div class="fetch-action">
            <button id="fetchBtn" class="status-btn" type="button">🔄 抓取今日数据</button>
            <span id="lastUpdate" class="fetch-hint"></span>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="date-picker">
            <span>历史日期</span>
            <select id="dateSelect" class="date-select" disabled>
              <option>暂无数据</option>
            </select>
          </div>
        </div>
      </header>

      <section class="metrics" aria-label="今日概览">
        <div><span>记录项目</span><strong id="repoCount">-</strong></div>
        <div><span>新入榜</span><strong id="newCount">-</strong></div>
        <div><span>最高日增星</span><strong id="maxStarsToday">-</strong></div>
      </section>

      <section class="section rising-section">
        <div class="section-head">
          <div>
            <h2>星数飙升前五</h2>
            <p>今天最值得先扫一眼的五个项目。</p>
          </div>
          <span>按今日新增星数排序</span>
        </div>
        <div id="risingList" class="rising-grid">
          <div class="status"><p>暂无数据，请点击「抓取今日数据」</p></div>
        </div>
      </section>

      <section class="section ranking-section">
        <div class="section-head">
          <div>
            <h2>当天排名前十</h2>
            <p>每个项目都补了一句中文用途概括，先看它能解决什么问题。</p>
          </div>
          <span>GitHub Trending Daily</span>
        </div>
        <div id="topTenList" class="rank-table"></div>
      </section>

    </main>

    <script>

    const CATEGORY_RULES = [
      {keywords:["context","prompt-engineering","token","context-window","prompt-compress","context-compress","headroom","prompt-cache","prompt-optim"],tags:["context","llm"],summary:"上下文工程工具，用于管理和压缩发送给大模型的内容，降低 token 消耗并保持回答质量。"},

      {keywords:["vulnerab","vuln","security-scan","cve","pentest","exploit","sbom","trivy","secret-scan","misconfig","security-audit","security-tool"],tags:["security","devops"],summary:"安全扫描工具，用于发现漏洞、配置错误、密钥泄露或 SBOM 风险，覆盖容器、代码仓库和云环境。"},
      {keywords:["llm","large-language-model","gpt","chatgpt","model-inference","openai","anthropic","model-serving","tokenizer","transformer","fine-tune","lora","rlhf"],tags:["llm","ai-agent"],summary:"大模型相关项目，可能涉及模型调用、推理优化、上下文处理或模型部署与交互体验改进。"},

    // ===== 工具函数 =====
    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function summarizeUse(repo, name, desc) {
      if (SUMMARIES[repo]) return SUMMARIES[repo];
      const text = `${name} ${desc}`.toLowerCase();
      for (const rule of CATEGORY_RULES) {
        if (rule.keywords.some(kw => text.includes(kw))) return rule.summary;
      }
      return `这个项目正在获得关注，名称「${name}」；建议点开仓库进一步确认具体使用场景。`;
    }

    function getTags(repo, name, desc) {
      const text = `${name} ${desc}`.toLowerCase();
      for (const rule of CATEGORY_RULES) {
        if (rule.keywords.some(kw => text.includes(kw))) return rule.tags || [];
      }
      return [];
    }

    function tagBadges(tags) {
      if (!tags || !tags.length) return "";
      return `<span class="tag-badges">${tags.map(t => `<span class="tag-badge">${esc(t)}</span>`).join("")}</span>`;
    }

    function metaPills(item) {
      const parts = [
        item.language || "Unknown",
        `${Number(item.stars||0).toLocaleString("zh-CN")} stars`,
        `今日 +${Number(item.starsToday||0).toLocaleString("zh-CN")}`
      ];
      if (item.isNewToday) {
        parts.push("新入榜");
      } else if (item.rankChange !== null && item.rankChange !== undefined) {
        if (item.rankChange === 0) parts.push("排名持平");
        else if (item.rankChange > 0) parts.push(`上升 ${item.rankChange}`);
        else parts.push(`下降 ${Math.abs(item.rankChange)}`);
      }
      return parts.map(s => `<span>${esc(s)}</span>`).join("");
    }

    function parseNum(s) { return Number(String(s||"").replace(/[^\d]/g,"")) || 0; }

    // ===== 解析 GitHub Trending HTML =====
    function parseGitHubHTML(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const articles = doc.querySelectorAll("article.Box-row");
      const items = [];

      articles.forEach((article, index) => {
        try {
          const h2 = article.querySelector("h2");
          if (!h2) return;
          const repoLink = h2.querySelector("a");
          if (!repoLink) return;
          const repoPath = repoLink.getAttribute("href").replace(/^\/+/,"").replace(/\s/g,"");
          const [owner, name] = repoPath.split("/");

          const descEl = article.querySelector("p.col-9");
          const description = descEl ? descEl.textContent.trim() : "";

          const langEl = article.querySelector("[itemprop='programmingLanguage']");
          const language = langEl ? langEl.textContent.trim() : "Unknown";

          const starsLink = article.querySelector("a[href$='/stargazers']");
          const stars = starsLink ? parseNum(starsLink.textContent) : 0;

          const forksLink = article.querySelector("a[href$='/forks']");
          const forks = forksLink ? parseNum(forksLink.textContent) : 0;

          const bodyText = article.textContent || "";
          const starsTodayMatch = bodyText.match(/([\d,]+)\s+stars?\s+today/i);
          const starsToday = starsTodayMatch ? parseNum(starsTodayMatch[1]) : 0;

          items.push({
            rank: index + 1,
            owner, name, repo: repoPath,
            url: `https://github.com/${repoPath}`,
            description, language, stars, forks, starsToday
          });
        } catch(e) { console.warn("解析第", index+1, "项失败", e); }
      });
      return items;
    }

    // ===== 存储 =====
    let allSnapshots = [];

    async function fetchRemoteIndex() {
      try {
        const resp = await fetch('data/index.json');
        if (!resp.ok) return null;
        const index = await resp.json();
        allSnapshots = index.snapshots || [];
        return allSnapshots;
      } catch(e) { return null; }
    }

    async function fetchRemoteData(date) {
      try {
        const resp = await fetch(`data/${date}.json`);
        if (!resp.ok) return null;
        return await resp.json();
      } catch(e) { return null; }
    }

    // ===== 本地存储（fallback）=====
    const INDEX_KEY = "gh_trending_index";

    function getIndex() {
      const raw = localStorage.getItem(INDEX_KEY);
      return raw ? JSON.parse(raw) : { snapshots: [] };
    }

    function saveSnapshot(snapshot) {
      const dataKey = `gh_trending_${snapshot.date}`;
      let index = getIndex();
      index.snapshots = index.snapshots.filter(s => s.date !== snapshot.date);
      index.snapshots.push({ date: snapshot.date, capturedAt: snapshot.capturedAt });
      index.snapshots.sort((a,b) => a.date.localeCompare(b.date));
      localStorage.setItem(INDEX_KEY, JSON.stringify(index));
      localStorage.setItem(dataKey, JSON.stringify(snapshot));
    }

    function loadSnapshot(date) {
      const raw = localStorage.getItem(`gh_trending_${date}`);
      return raw ? JSON.parse(raw) : null;
    }

    // ===== 渲染 =====
    function renderSnapshot(snapshot) {
      const repos = snapshot.repositories || [];
      document.getElementById("repoCount").textContent = repos.length.toLocaleString("zh-CN");
      document.getElementById("newCount").textContent = repos.filter(r => r.isNewToday).length.toLocaleString("zh-CN");
      const maxStar = repos.length > 0 ? Math.max(...repos.map(r => r.starsToday)) : 0;
      document.getElementById("maxStarsToday").textContent = maxStar.toLocaleString("zh-CN");

      // 飙升前五
      const risingList = document.getElementById("risingList");
      const topRising = snapshot.topRising || [];
      if (topRising.length === 0) {
        risingList.innerHTML = '<div class="status"><p>无飙升数据</p></div>';
      } else {
        risingList.innerHTML = topRising.map((item, i) => risingCard(item, i)).join("");
      }

      // 排名前十
      const topTenList = document.getElementById("topTenList");
      const topTen = snapshot.topTen || [];
      if (topTen.length === 0) {
        topTenList.innerHTML = "";
      } else {
        topTenList.innerHTML = topTen.map(item => rankRow(item)).join("");
      }

      const newCount = repos.filter(r => r.isNewToday).length;
      document.getElementById("subtitle").textContent = `📦 缓存数据 · ${snapshot.date} 快照，共 ${repos.length} 个项目，${newCount} 个新入榜。`;
      document.getElementById("lastUpdate").textContent = `最近更新：${new Date().toLocaleTimeString("zh-CN")}`;
    }

    function risingCard(item, index) {
      const cls = index === 0 ? "rising-card primary" : "rising-card";
      const tags = getTags(item.repo, item.name, item.description);
      return `
        <a class="${cls}" href="${esc(item.url)}" target="_blank" rel="noreferrer">
          <div class="rising-topline">
            <span class="rank-badge">#${index+1}</span>
            <strong>+${Number(item.starsToday||0).toLocaleString("zh-CN")}</strong>
          </div>
          <h3>${esc(item.repo)}</h3>
          <p>${esc(summarizeUse(item.repo, item.name, item.description))}${tagBadges(tags)}</p>
          <div class="repo-meta">${metaPills(item)}</div>
        </a>`;
    }

    function rankRow(item) {
      const cls = item.isNewToday ? "rank-row is-new" : "rank-row";
      const tags = getTags(item.repo, item.name, item.description);
      return `
        <a class="${cls}" href="${esc(item.url)}" target="_blank" rel="noreferrer">
          <div class="rank-num">#${item.rank}</div>
          <div class="rank-main">
            <div class="repo-title">${esc(item.repo)}</div>
            <p class="use-case">${esc(summarizeUse(item.repo, item.name, item.description))}${tagBadges(tags)}</p>
            <p class="repo-desc">${esc(item.description || "暂无简介")}</p>
          </div>
          <div class="rank-stats">
            <strong>${Number(item.starsToday||0).toLocaleString("zh-CN")}</strong>
            <span>今日增星</span>
          </div>
          <div class="rank-stats">
            <strong>${Number(item.stars||0).toLocaleString("zh-CN")}</strong>
            <span>总星数</span>
          </div>
          <div class="rank-change">${esc(item.isNewToday ? "新入榜" : (item.rankChange===0?"排名持平":item.rankChange>0?`上升 ${item.rankChange}`:`下降 ${Math.abs(item.rankChange)}`))}</div>
        </a>`;
    }

    // ===== 日期选择器核心：填充下拉选项（不触发数据加载）=====
    async function populateDateSelect(snapshots, skipAutoLoad) {
      const sel = document.getElementById("dateSelect");
      sel.disabled = false;
      const sorted = snapshots.slice().sort((a,b) => a.date.localeCompare(b.date));
      sel.innerHTML = sorted.reverse().map(s => {
        const isLatest = s.date === sorted.at(-1).date;
        return `<option value="${s.date}" ${isLatest?"selected":""}>${s.date}${isLatest?" (最新)":""}</option>`;
      }).join("");
      sel.onchange = async () => {
        const snap = await fetchRemoteData(sel.value);
        if (snap) renderSnapshot(snap);
        else alert("加载数据失败，请检查网络连接");
      };
      // 仅在首次初始化时自动加载最新数据，避免覆盖实时抓取结果
      if (!skipAutoLoad) {
        const latestSnap = await fetchRemoteData(sorted.at(-1).date);
        if (latestSnap) renderSnapshot(latestSnap);
      }
    }

    // ===== 初始化历史日期选择器 =====
    async function initDateSelect(skipAutoLoad) {
      const sel = document.getElementById("dateSelect");
      // 先尝试从远程加载
      let snapshots = await fetchRemoteIndex();
      if (snapshots && snapshots.length > 0) {
        await populateDateSelect(snapshots, skipAutoLoad);
        return;
      }

      // Fallback: 本地模式
      const index = getIndex();
      if (index.snapshots.length === 0) {
        sel.innerHTML = "<option>暂无数据</option>";
        sel.disabled = true;
        return;
      }
      const localSnapshots = index.snapshots.map(s => ({ date: s.date, file: s.file }));
      await populateDateSelect(localSnapshots, skipAutoLoad);
      // 本地模式下调整 onchange 使用本地加载
      sel.onchange = () => {
        const snap = loadSnapshot(sel.value);
        if (snap) renderSnapshot(snap);
      };
    }

    // ===== 核心：抓取数据 =====
    async function fetchTrending() {
      const btn = document.getElementById("fetchBtn");
      btn.disabled = true;
      btn.textContent = "⏳ 正在抓取...";

      const risingList = document.getElementById("risingList");
      risingList.innerHTML = '<div class="status"><p>⏳ 正在通过代理抓取 GitHub Trending 页面，请稍候...</p></div>';
      document.getElementById("topTenList").innerHTML = "";

      // 尝试多个 CORS 代理，每个代理重试 MAX_RETRIES_PER_PROXY 次
      let html = "";
      let errMsg = "";
      for (const proxyFn of CORS_PROXIES) {
        for (let attempt = 0; attempt < MAX_RETRIES_PER_PROXY; attempt++) {
          const url = proxyFn("https://github.com/trending?since=daily");
          try {
            const resp = await fetch(url, { signal: AbortSignal.timeout(15000) });
            if (resp.ok) { html = await resp.text(); break; }
          } catch(e) {
            errMsg = e.message;
            if (attempt < MAX_RETRIES_PER_PROXY - 1) {
              await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
            }
          }
        }
        if (html) break;
      }

      if (!html) {
        risingList.innerHTML = `<div class="status">
          <p>❌ 抓取失败：所有 CORS 代理均不可用。</p>
          <p style="margin-top:12px;font-size:14px;">错误详情：${esc(errMsg)}</p>
          <p style="margin-top:12px;font-size:14px;">建议：直接访问 <a href="https://github.com/trending?since=daily" target="_blank">GitHub Trending</a> 查看。</p>
        </div>`;
        btn.disabled = false;
        btn.textContent = "🔄 重试抓取";
        return;
      }

      try {
        const repos = parseGitHubHTML(html);
        if (repos.length === 0) throw new Error("页面解析未找到任何项目，GitHub 可能已改版或代理返回了错误内容");

        // 与本地历史数据对比
        let prevMap = new Map();
        if (allSnapshots.length > 0) {
          const prevDate = allSnapshots.at(-1).date;
          const prevSnap = await fetchRemoteData(prevDate);
          if (prevSnap && prevSnap.repositories) {
            prevSnap.repositories.forEach(r => prevMap.set(r.repo, r));
          }
        } else {
          const index = getIndex();
          const prevDate = index.snapshots.length > 0 ? index.snapshots.at(-1).date : null;
          const prevSnap = prevDate ? loadSnapshot(prevDate) : null;
          if (prevSnap && prevSnap.repositories) {
            prevSnap.repositories.forEach(r => prevMap.set(r.repo, r));
          }
        }

        const enriched = repos.map((r, i) => {
          const prev = prevMap.get(r.repo);
          return {
            ...r,
            previousRank: prev ? prev.rank : null,
            rankChange: prev ? prev.rank - (i+1) : null,
            isNewToday: !prev
          };
        });

        const today = new Date().toISOString().slice(0,10);
        const snapshot = {
          date: today,
          source: "https://github.com/trending?since=daily",
          capturedAt: new Date().toISOString(),
          topRising: [...enriched].sort((a,b) => b.starsToday - a.starsToday).slice(0,5),
          topTen: enriched.slice(0,10),
          repositories: enriched
        };

        saveSnapshot(snapshot);
        renderSnapshot(snapshot);

        // 刷新日期选择器下拉列表，但不自动加载（避免覆盖刚抓取的实时数据）
        await initDateSelect(true);

        const newCount = enriched.filter(r => r.isNewToday).length;
        document.getElementById("subtitle").textContent = `🟢 实时数据 · ${today} 抓取自 GitHub Trending，共 ${repos.length} 个项目，${newCount} 个新入榜。`;
      } catch(err) {
        risingList.innerHTML = `<div class="status"><p>❌ 解析失败：${esc(err.message)}</p></div>`;
      }

      btn.disabled = false;
      btn.textContent = "🔄 重新抓取";
    }

    // ===== 启动 =====
    document.getElementById("fetchBtn").addEventListener("click", fetchTrending);
    document.getElementById("fetchBtn").disabled = false;

    async function loadRemoteSummaries() {
      try {
        const resp = await fetch("data/summaries.zh.json");
        if (resp.ok) {
          const remote = await resp.json();
          Object.assign(SUMMARIES, remote);
          console.log("已加载远程手工描述");
        }
      } catch(e) { /* 静默失败，使用内置 SUMMARIES */ }
    }

    (async function init() {
      await loadRemoteSummaries();
      initDateSelect();
    })();
    </script>
  </body>
</html>
