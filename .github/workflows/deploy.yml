name: Fetch GitHub Trending & Deploy

on:
  schedule:
    # 每天 UTC 10:00 = 北京时间 18:00（此时 Trending 数据已完整，可拿到 25 条）
    - cron: '0 10 * * *'
  workflow_dispatch:  # 允许手动触发

# 权限：contents 写权限用于 git push，pages 用于部署
permissions:
  contents: write
  pages: write
  id-token: write

# 避免重复部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史以便 git pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install --ignore-scripts

      - name: 抓取 GitHub Trending 数据
        run: node scripts/fetch-github-trending.mjs

      - name: 生成报告
        run: node scripts/build-report.mjs

      - name: 准备 docs 目录（GitHub Pages 源）
        run: |
          # 创建 .nojekyll 阻止 Jekyll 处理
          touch docs/.nojekyll
          # 复制独立 HTML 作为首页（带实时抓取按钮）
          cp github-trending-standalone.html docs/index.html
          # 复制静态报告（无按钮纯报告版本）
          cp report.html docs/report.html 2>/dev/null || true
          # 复制数据文件到 docs/data/
          mkdir -p docs/data
          cp data/*.json docs/data/ || echo "⚠️ 暂无数据文件"
          # 复制样式和脚本（供 index.html 使用）
          cp styles.css docs/ 2>/dev/null || true
          cp app.js docs/ 2>/dev/null || true
          echo "✅ docs/ 目录准备完毕"
          echo "--- docs/ 内容 ---"
          find docs/ -type f | sort

      - name: 提交数据更新到仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ report.html *.html 2>/dev/null || true
          # 只在有变化时才提交
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update trending data for $(TZ=Asia/Shanghai date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
            echo "✅ 数据已推送到仓库"
          else
            echo "ℹ️ 数据无变化，跳过提交"
          fi

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
