name: Fetch GitHub Trending & Deploy

on:
  schedule:
    # 每天 UTC 1:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

# 只开放最小权限
permissions:
  contents: write
  pages: write
  id-token: write

# 避免重复部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整历史以便 git pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        run: npm install

      - name: 抓取 GitHub Trending 数据
        run: node scripts/fetch-github-trending.mjs

      - name: 生成报告
        run: node scripts/build-report.mjs

      - name: 准备 docs 目录（GitHub Pages 源）
        run: |
          mkdir -p docs/data
          # 复制独立 HTML 作为首页
          cp github-trending-standalone.html docs/index.html
          # 复制数据文件
          cp data/*.json docs/data/
          echo "docs/ 目录准备完毕"
          ls -la docs/
          ls -la docs/data/

      - name: 提交数据更新到仓库
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || {
            git commit -m "chore: auto-update trending data for $(TZ=Asia/Shanghai date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          }
        continue-on-error: true  # 如果没有变化则跳过

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
